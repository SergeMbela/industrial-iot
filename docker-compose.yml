version: '3.8'

services:
  # RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL - Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: industrial_iot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - Visualization and Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qrand - Random data generation service (optional)
  # Uncomment if you have a specific Qrand image or service
  # qrand:
  #   image: qrand:latest
  #   container_name: qrand
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - LOG_LEVEL=info

volumes:
  rabbitmq_data:
  postgres_data:
  grafana_data:

# Notes:
# 1. Twilio is a cloud service - you don't need to run it in Docker
#    Instead, configure Twilio credentials in your application environment variables
# 2. Access services at:
#    - RabbitMQ Management: http://localhost:15672 (guest/guest)
#    - Grafana: http://localhost:3000 (admin/admin123)
#    - PostgreSQL: localhost:5432
# 3. To start: docker-compose up -d
# 4. To stop: docker-compose down
